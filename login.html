<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - MyPetLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>

        
    </style>
</head>
<body class="bg-light">

    <div class="full-height-container">

        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card login-card p-4">
                        <div class="card-body">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold">🐾 MyPetCare</h2>
                                <p class="text-muted small">Acceso Administrativo</p>
                            </div>
    
                            <form action="index.html" method="POST" id="loginForm"> <div class="mb-3">
                                    <label for="email" class="form-label small fw-bold">Correo Electrónico</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                        <input type="email" class="form-control bg-light border-0" id="email-input" placeholder="admin@mypetlink.com" required>
                                    </div>
                                </div>
    
                                <div class="mb-4">
                                    <label for="password" class="form-label small fw-bold">Contraseña</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                        <input type="password" class="form-control bg-light border-0" id="password-input" placeholder="••••••••" required>
                                    </div>
                                </div>
    
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-login fw-bold py-3 rounded-pill shadow-sm">
                                        Ingresar al Panel <i class="fas fa-arrow-right ms-2"></i>
                                    </button>
                                </div>
                            </form>
    
                            <div class="text-center mt-4">
                                <a href="#" class="text-decoration-none small text-muted">¿Olvidaste tu contraseña?</a>
                            </div>
                        </div>
                    </div>
                    
                    <p class="text-center mt-4 small text-secondary">
                        &copy; 2026 MyPetLink - Gestión Veterinaria
                    </p>
                </div>
            </div>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
