<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado - MyPetLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Estilo específico para resaltar la advertencia */
        .icon-unauthorized {
            font-size: 4rem;
            color: var(--tangerine-dream);
            background: #fff3f0;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(226, 149, 120, 0.2);
        }
        .btn-unauthorized {
            background: var(--grad-primary);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-unauthorized:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(131, 197, 190, 0.4);
            color: white;
        }
    </style>
</head>
<body class="bg-light">

    <div class="full-height-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card login-card p-4 border-top border-5" style="border-color: var(--tangerine-dream) !important;">
                        <div class="card-body text-center">
                            
                            <div class="icon-unauthorized mb-4">
                                <i class="fas fa-user-shield"></i>
                            </div>

                            <h2 class="fw-bold mb-3">Acceso Restringido</h2>
                            
                            <p class="text-muted mb-4">
                                Tu cuenta no tiene permisos de <strong>Administrador</strong> para ver esta sección.
                            </p>

                            <div class="d-grid gap-3">
                                <a href="login.html" class="btn btn-unauthorized fw-bold py-3 rounded-pill">
                                    <i class="fas fa-arrow-left me-2"></i> Volver al Login
                                </a>
                                
                                <button id="btnLogout" class="btn btn-link text-decoration-none text-muted small">
                                    Cerrar sesión actual
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <p class="text-center mt-4 small text-secondary">
                        &copy; 2026 MyPetLink - Seguridad Veterinaria
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { supabase } from './js/supabaseConfig.js';

        // Lógica para cerrar sesión por si el usuario quiere entrar con otra cuenta
        document.getElementById('btnLogout')?.addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            if (!error) {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
